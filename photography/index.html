<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography | MNV</title>
  <link rel="stylesheet" href="../../css/photography.css" />
  <link href="../assets/favicon.ico" rel="icon" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/photography" id="currentActiveNavButton">Photography</a>
    </nav>
  </header>

  <main>
    <section class="photo-gallery">
      <h2 id="photoGalleryHeader">Photography</h2>
      <div class="masonry" id="masonry">
        <div class="grid-sizer"></div>
      </div>
      <div id="loader">Loading more photos...</div>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <img id="modal-img" src="" alt="">
  </div>

  <button id="scrollToTop" class="scroll-top hidden" aria-label="Scroll to top">↑</button>

  <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
  <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
  <script type="module" src="../javascript/script.js"></script>
</body>
</html>
